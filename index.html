<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alexandra & Athanasios — 17 July 2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&family=Corinthia&family=Pinyon+Script&family=Ephesis&family=Italianno&family=Beau+Rivage&family=Tangerine:wght@400;700&family=Cinzel:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy:  #1E2A5E;
    --blue:  #7393B3;
    --gold:  #D4A017;
    --ivory: #F7EFD8;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --roman: 'Cinzel', serif;
    --script:'Monsieur La Doulaise', cursive;
    --sans:  'Jost', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--ivory);
  }

  /* Folk corner ornaments */
  .corner-ornament {
    position: fixed;
    width: clamp(200px, 36vmin, 400px);
    height: clamp(200px, 36vmin, 400px);
    pointer-events: none; z-index: 2;
    background-image: url('homepage.jpg');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    mix-blend-mode: multiply;
    opacity: 0.92;
  }
  .corner-ornament--tl { top: 0; left: 0; transform: rotate(180deg); }
  .corner-ornament--tr { top: 0; right: 0; transform: rotate(270deg); }
  .corner-ornament--bl { bottom: 0; left: 0; transform: rotate(90deg); }
  .corner-ornament--br { bottom: 0; right: 0; transform: rotate(0deg); }



  /* Page */
  .page {
    position: relative; z-index: 1;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  /* Card */
  .card {
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    padding: clamp(48px,7vw,80px) clamp(32px,6vw,80px) clamp(32px,4vw,56px);
    max-width: 700px; width: 100%;
  }

  /* Names */
  .names {
    font-family: 'Corinthia', cursive;
    font-size: clamp(42px,6vw,80px);
    font-weight: 400;
    color: #1E2A5E;
    line-height: 1.1; letter-spacing: 0.18em;
    opacity: 0; animation: fadeUp 1.2s cubic-bezier(.22,.61,.36,1) 0.2s forwards;
  }
  .amp {
    display: block;
    font-family: var(--script);
    font-size: clamp(28px,4vw,52px);
    background: linear-gradient(105deg,#B8860B 20%,#FFD700 38%,#FFF0A0 50%,#FFD700 62%,#B8860B 80%);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: goldShimmer 4s linear infinite;
    margin: clamp(4px,0.6vw,8px) 0;
  }

  /* Greek divider strip */
  .greek-divider {
    width: clamp(180px,40vw,420px);
    margin: clamp(10px,1.5vw,20px) auto;
    opacity: 0; animation: fadeIn 1s ease 0.7s forwards;
    line-height: 0;
  }
  .wavy-divider {
    width: 100%;
    display: block;
    overflow: visible;
  }

  /* Date & location */
  .meta {
    font-family: var(--serif); font-size: clamp(12px,1.4vw,16px);
    font-weight: 300; letter-spacing: 0.18em; color: var(--navy);
    line-height: 2.2; margin-bottom: clamp(36px,5vw,60px);
    opacity: 0; animation: fadeUp 1s ease 0.85s forwards;
  }
  .meta .location { display: block; font-style: italic; font-size: 0.88em; opacity: 0.7; letter-spacing: 0.12em; }

  /* Buttons */
  .buttons {
    display: flex; flex-direction: column; gap: clamp(14px,2vw,20px);
    width: 100%; max-width: 320px; gap: clamp(28px,4vw,44px); display: flex; flex-direction: column; align-items: center;
    opacity: 0; animation: fadeUp 1s ease 1.1s forwards;
  }

  .btn {
    display: block; width: 100%;
    font-family: var(--roman); font-size: clamp(8px,0.9vw,10px);
    font-weight: 300; letter-spacing: 0.38em; text-transform: uppercase;
    text-decoration: none; padding: clamp(10px,1.4vw,14px) 20px;
    transition: all 0.3s ease;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--ivory);
    border: none;
    border-radius: 50px;
    padding: clamp(12px,1.8vw,18px) clamp(32px,5vw,60px);
    box-shadow: 0 4px 18px rgba(212,160,23,0.25);
    letter-spacing: 0.25em;
    font-size: clamp(9px,1vw,12px);
  }
  .btn-primary:hover { background: #c49010; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(212,160,23,0.35); }
  .btn-secondary {
    background: transparent; color: var(--navy);
    border: none;
    outline: none;
  }
  .btn-secondary:hover { background: rgba(30,42,94,0.04); transform: translateY(-2px); }
  .btn-border {
    display: block;
    width: 100%;
    line-height: 0;
    padding: 4px 0;
  }
  .btn-border svg {
    width: 100%;
    display: block;
    overflow: visible;
  }
  .btn-wrap {
    display: flex; flex-direction: column; align-items: center;
    width: 100%;
  }
  .btn-wrap .btn {
    max-width: 320px;
  }
  .btn-label {
    display: block; font-family: var(--serif); font-size: clamp(10px,1.1vw,12px);
    font-style: italic; font-weight: 300; letter-spacing: 0.04em;
    margin-top: 3px; opacity: 0.6; text-transform: none;
  }

  @keyframes fadeUp  { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:none; } }
  @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
  @keyframes goldShimmer {
    0%   { background-position: -200% center; }
    100% { background-position:  200% center; }
  }
</style>
</head>
<body>

<div class="corner-ornament corner-ornament--tl"></div>
<div class="corner-ornament corner-ornament--tr"></div>
<div class="corner-ornament corner-ornament--bl"></div>
<div class="corner-ornament corner-ornament--br"></div>



<div class="page">
  <div class="card">

    <h1 class="names">
      Alexandra<br>
      <span class="amp">&amp;</span>
      Athanasios
    </h1>

    <div class="greek-divider">
      <svg class="wavy-divider" viewBox="0 0 400 20" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0,10 C25,2 50,18 75,10 C100,2 125,18 150,10 C175,2 200,18 225,10 C250,2 275,18 300,10 C325,2 350,18 375,10 C387,5 394,8 400,10" fill="none" stroke="#7393B3" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="buttons">
      <div class="btn-wrap">
        <a href="save-the-date.html" class="btn btn-primary">Save the Date</a>
      </div>
      <div class="btn-wrap">
        <a href="invitation.html" class="btn btn-primary">Formal Invitation</a>
      </div>
    </div>
</div>

</body>
</html>
