<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #EDE0CE;
    overflow: hidden;
  }

  main {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .crest {
    width: min(700px, 88vw, 78vh);
    height: min(700px, 88vw, 78vh);
    object-fit: contain;
    animation: fadeUp 1.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  .btn-wrap {
    margin-top: 28px;
    animation: fadeUp 1.6s 0.3s cubic-bezier(0.22,1,0.36,1) both;
  }
  .btn {
    display: inline-block;
    padding: 13px 48px;
    border: 1px solid #5D768B;
    font-family: 'Cormorant SC', serif;
    font-size: clamp(0.63rem, 1.2vw, 0.74rem);
    letter-spacing: 0.32em;
    color: #5D768B;
    text-decoration: none;
    text-transform: uppercase;
    background: transparent;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.42s;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: #5D768B;
    transform: translateX(-101%);
    transition: transform 0.42s cubic-bezier(0.22,1,0.36,1);
  }
  .btn:hover { color: #F8F0E5; }
  .btn:hover::before { transform: translateX(0); }
  .btn span { position: relative; z-index: 1; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
